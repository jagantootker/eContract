# ─────────────────────────────────────────────────────────────────────────────
# LOCAL DEVELOPMENT
# Builds images from source code on this machine.
#
# Usage:
#   cp .env.docker.example .env.docker
#   # edit .env.docker with your local values
#   docker compose -f docker-compose.local.yml --env-file .env.docker up --build
# ─────────────────────────────────────────────────────────────────────────────
name: ekontrak-local

services:

  # ── MySQL 8 ──────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: ekontrak_mysql_local
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE:      ${DB_DATABASE:-ekontract_api}
      MYSQL_USER:          ${DB_USERNAME:-ekontrak}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-secret}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1",
             "-uroot", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ekontrak_net

  # ── Backend API ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend/ekontrak-api
      dockerfile: Dockerfile
    image: ekontrak-backend:local
    container_name: ekontrak_backend_local
    restart: unless-stopped
    environment:
      APP_NAME:    "eKontrak-API"
      APP_ENV:     local
      APP_KEY:     ${BACKEND_APP_KEY:-}
      APP_DEBUG:   "true"
      APP_URL:     "http://localhost:8001"
      DB_CONNECTION: mysql
      DB_HOST:       mysql
      DB_PORT:       3306
      DB_DATABASE:   ${DB_DATABASE:-ekontract_api}
      DB_USERNAME:   ${DB_USERNAME:-ekontrak}
      DB_PASSWORD:   ${DB_PASSWORD:-secret}
      QUEUE_CONNECTION: database
      MAIL_MAILER:      ${MAIL_MAILER:-log}
      MAIL_HOST:        ${MAIL_HOST:-}
      MAIL_PORT:        ${MAIL_PORT:-587}
      MAIL_USERNAME:    ${MAIL_USERNAME:-}
      MAIL_PASSWORD:    ${MAIL_PASSWORD:-}
      MAIL_FROM_ADDRESS: noreply@kpkt.gov.my
      MAIL_FROM_NAME:    "eKontrak KPKT"
      SANCTUM_STATEFUL_DOMAINS: "localhost:8000"
      CORS_ALLOWED_ORIGINS:     "http://localhost:8000"
    volumes:
      - backend_storage:/var/www/html/storage/app
      - backend_logs:/var/www/html/storage/logs
    ports:
      - "8001:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ekontrak_net

  # ── Frontend Web ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend/ekontrak-web
      dockerfile: Dockerfile
    image: ekontrak-frontend:local
    container_name: ekontrak_frontend_local
    restart: unless-stopped
    environment:
      APP_NAME:  "eKontrak"
      APP_ENV:   local
      APP_KEY:   ${FRONTEND_APP_KEY:-}
      APP_DEBUG: "true"
      APP_URL:   "http://localhost:8000"
      # Internal Docker network URL — PHP makes server-side calls to the API
      API_BASE_URL: "http://backend/api/v1"
      DB_CONNECTION: mysql
      DB_HOST:       mysql
      DB_PORT:       3306
      DB_DATABASE:   ${DB_DATABASE:-ekontract_api}
      DB_USERNAME:   ${DB_USERNAME:-ekontrak}
      DB_PASSWORD:   ${DB_PASSWORD:-secret}
      SESSION_DRIVER: file
    volumes:
      - frontend_storage:/var/www/html/storage/app
      - frontend_logs:/var/www/html/storage/logs
    ports:
      - "8000:80"
    depends_on:
      - backend
    networks:
      - ekontrak_net

volumes:
  mysql_data:
  backend_storage:
  backend_logs:
  frontend_storage:
  frontend_logs:

networks:
  ekontrak_net:
    driver: bridge
